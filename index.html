<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>KAWAN PAPA - Kolom Aspirasi Ke Dewan Padang Pariaman</title>
    
    <meta name="description" content="KAWAN PAPA - Kolom Aspirasi Online Masyarakat Kabupaten Padang Pariaman. Platform resmi untuk menyampaikan aspirasi, keluhan, dan saran kepada DPRD.">
    <meta name="author" content="Sekretariat DPRD Kabupaten Padang Pariaman">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-tr from-emerald-900 via-slate-900 to-teal-800 text-gray-100 min-h-screen flex flex-col justify-between antialiased">

    <header class="bg-emerald-950/40 backdrop-blur-md text-white shadow-lg py-3 px-4 md:px-6 border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-2">
            
            <div class="flex-shrink-0 bg-white/10 p-1 rounded-lg backdrop-blur-sm border border-white/10">
                <img src="lambang.png" alt="Lambang Daerah" 
                     class="h-10 w-auto md:h-14 object-contain filter drop-shadow-md"
                     onerror="this.style.display='none'">
            </div>
            
            <div class="text-center flex-1 min-w-0 px-1">
                <h1 class="text-xl md:text-2xl font-extrabold tracking-wider bg-gradient-to-r from-emerald-400 via-teal-200 to-cyan-300 bg-clip-text text-transparent drop-shadow-sm">
                    KAWAN PAPA
                </h1>
                <p class="text-[10px] md:text-xs bg-emerald-500/20 px-2 md:px-3 py-0.5 rounded-full border border-emerald-400/30 font-medium inline-block max-w-full truncate mt-1 text-emerald-300">
                    Sekretariat DPRD Kab. Padang Pariaman
                </p>
            </div>
            
            <div class="flex-shrink-0 bg-white/10 p-1 rounded-lg backdrop-blur-sm border border-white/10">
                <img src="logo_dprd.png" alt="Logo DPRD" 
                     class="h-10 w-auto md:h-14 object-contain filter drop-shadow-md"
                     onerror="this.style.display='none'">
            </div>
            
        </div>
    </header>

    <main class="max-w-xl w-full mx-auto p-6 my-8 bg-slate-900/60 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/10 mx-4 sm:mx-auto">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-white tracking-wide">Sampaikan Aspirasi Anda</h2>
            <p class="text-sm text-emerald-300/70 mt-1">Layanan aspirasi online masyarakat Kabupaten Padang Pariaman</p>
        </div>

        <form id="formAspirasi" class="space-y-4 text-gray-200">
            <div>
                <label for="nama" class="block text-sm font-medium text-emerald-300 mb-1">Nama Lengkap *</label>
                <input type="text" id="nama" name="nama" required 
                    class="w-full px-3 py-2 bg-slate-950/40 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent focus:bg-slate-950/80 text-white text-sm transition-all placeholder-gray-500" 
                    placeholder="Masukkan nama lengkap Anda">
                <p id="namaError" class="text-xs text-rose-400 font-medium mt-1 hidden"></p>
            </div>

            <div>
                <label for="no_hp" class="block text-sm font-medium text-emerald-300 mb-1">Nomor HP / WhatsApp *</label>
                <input type="tel" id="no_hp" name="no_hp" required
                    class="w-full px-3 py-2 bg-slate-950/40 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent focus:bg-slate-950/80 text-white text-sm transition-all placeholder-gray-500" 
                    placeholder="Contoh: 081234567890">
                <p id="no_hpError" class="text-xs text-rose-400 font-medium mt-1 hidden"></p>
            </div>

            <div>
                <label for="kecamatan" class="block text-sm font-medium text-emerald-300 mb-1">Kecamatan *</label>
                <select id="kecamatan" name="kecamatan" required 
                    class="w-full px-3 py-2 bg-slate-950/40 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent focus:bg-slate-950/80 text-white text-sm transition-all appearance-none cursor-pointer">
                    <option value="" disabled selected class="bg-slate-900 text-gray-400">-- Pilih Kecamatan --</option>
                    <option value="2X11 Enam Lingkung" class="bg-slate-900 text-white">2X11 Enam Lingkung</option>
                    <option value="2X11 Kayu Tanam" class="bg-slate-900 text-white">2X11 Kayu Tanam</option>
                    <option value="IV Koto Aur Malintang" class="bg-slate-900 text-white">IV Koto Aur Malintang</option>
                    <option value="Batang Anai" class="bg-slate-900 text-white">Batang Anai</option>
                    <option value="Batang Gasan" class="bg-slate-900 text-white">Batang Gasan</option>
                    <option value="Enam Lingkung" class="bg-slate-900 text-white">Enam Lingkung</option>
                    <option value="Lubuk Alung" class="bg-slate-900 text-white">Lubuk Alung</option>
                    <option value="Nan Sabaris" class="bg-slate-900 text-white">Nan Sabaris</option>
                    <option value="Padang Sago" class="bg-slate-900 text-white">Padang Sago</option>
                    <option value="Patamuan" class="bg-slate-900 text-white">Patamuan</option>
                    <option value="Sintuk Toboh Gadang" class="bg-slate-900 text-white">Sintuk Toboh Gadang</option>
                    <option value="Sungai Geringging" class="bg-slate-900 text-white">Sungai Geringging</option>
                    <option value="Sungai Limau" class="bg-slate-900 text-white">Sungai Limau</option>
                    <option value="Ulakan Tapakis" class="bg-slate-900 text-white">Ulakan Tapakis</option>
                    <option value="V Koto Kampung Dalam" class="bg-slate-900 text-white">V Koto Kampung Dalam</option>
                    <option value="V Koto Timur" class="bg-slate-900 text-white">V Koto Timur</option>
                    <option value="VII Koto Sungai Sarik" class="bg-slate-900 text-white">VII Koto Sungai Sarik</option>
                </select>
                <p id="kecamatanError" class="text-xs text-rose-400 font-medium mt-1 hidden"></p>
            </div>

            <div>
                <label for="alamat" class="block text-sm font-medium text-emerald-300 mb-1">Alamat Lengkap / Detail *</label>
                <input type="text" id="alamat" name="alamat" required
                    class="w-full px-3 py-2 bg-slate-950/40 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent focus:bg-slate-950/80 text-white text-sm transition-all placeholder-gray-500" 
                    placeholder="Nama korong, jalan, atau nomor rumah">
                <p id="alamatError" class="text-xs text-rose-400 font-medium mt-1 hidden"></p>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="aspirasi" class="block text-sm font-medium text-emerald-300">Isi Aspirasi *</label>
                    <span class="text-xs text-emerald-400/60"><span id="charCount" class="font-bold text-emerald-400">0</span> karakter</span>
                </div>
                <textarea id="aspirasi" name="aspirasi" rows="4" required 
                    class="w-full px-3 py-2 bg-slate-950/40 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent focus:bg-slate-950/80 text-white text-sm transition-all placeholder-gray-500 shadow-inner" 
                    placeholder="Tuliskan aspirasi, keluhan, atau saran Anda secara jelas..."></textarea>
                <p id="aspirasiError" class="text-xs text-rose-400 font-medium mt-1 hidden"></p>
            </div>

            <button type="submit" id="btnKirim" 
                class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-semibold py-3 px-4 rounded-xl transition-all duration-300 shadow-lg shadow-emerald-950/50 cursor-pointer text-sm tracking-wide transform active:scale-[0.98]">
                Kirim Aspirasi Publik
            </button>
        </form>

        <div id="notifikasi" class="mt-4 p-3 rounded-xl text-center font-semibold text-sm hidden"></div>
    </main>

    <footer class="bg-slate-950/60 backdrop-blur-md text-center py-4 text-xs text-emerald-400/50 border-t border-white/5 tracking-wide">
        <p>&copy; 2026 Sekretariat DPRD Kabupaten Padang Pariaman. All Rights Reserved.</p>
    </footer>

    <script>
        /**
         * KAWAN PAPA - Engine Pendataan Aspirasi Mandiri (Glassmorphism Edition)
         */

        // ⚙️ Konfigurasi URL Web App Google Apps Script Anda
        const CONFIG = {
            API_URL: "https://script.google.com/macros/s/AKfycbyJMGKxhTWtg5fNoI9U3ECakmZNgru3IuZ4i4Gex_z5gcxCQVLnkm0G9-Y5_TMIK2Yl/exec"
        };

        const form = document.getElementById('formAspirasi');
        const btnKirim = document.getElementById('btnKirim');
        const notifikasi = document.getElementById('notifikasi');
        const aspirasiField = document.getElementById('aspirasi');
        const charCount = document.getElementById('charCount');

        // Penghitung Jumlah Karakter Live
        aspirasiField.addEventListener('input', function() {
            charCount.textContent = this.value.length;
        });

        function validatePhoneNumber(phone) {
            const pattern = /^(\+62|0)[0-9]{9,13}$/;
            return pattern.test(phone.trim());
        }

        function showFieldError(fieldId, message) {
            const errorElement = document.getElementById(fieldId + 'Error');
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.classList.remove('hidden');
            }
        }

        function clearErrors() {
            document.querySelectorAll('[id$="Error"]').forEach(el => {
                el.classList.add('hidden');
                el.textContent = '';
            });
        }

        function validateForm() {
            clearErrors();
            let isValid = true;

            const nama = document.getElementById('nama').value.trim();
            if (!nama || nama.length < 3) {
                showFieldError('nama', 'Nama wajib diisi minimal 3 karakter.');
                isValid = false;
            }

            const no_hp = document.getElementById('no_hp').value.trim();
            if (!validatePhoneNumber(no_hp)) {
                showFieldError('no_hp', 'Format nomor HP salah (Contoh: 08123456789).');
                isValid = false;
            }

            const kecamatan = document.getElementById('kecamatan').value;
            if (!kecamatan) {
                showFieldError('kecamatan', 'Silakan pilih wilayah kecamatan asal Anda.');
                isValid = false;
            }

            const alamat = document.getElementById('alamat').value.trim();
            if (!alamat || alamat.length < 5) {
                showFieldError('alamat', 'Alamat wajib diisi minimal 5 karakter (Nama korong/jalan).');
                isValid = false;
            }

            const aspirasi = document.getElementById('aspirasi').value.trim();
            if (!aspirasi || aspirasi.length < 10) {
                showFieldError('aspirasi', 'Isi aspirasi terlalu singkat, minimal 10 karakter.');
                isValid = false;
            }

            return isValid;
        }

        function showNotification(message, isSuccess) {
            notifikasi.textContent = message;
            if (isSuccess) {
                notifikasi.className = "mt-4 p-3 rounded-xl text-center font-semibold bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 text-sm shadow-lg";
            } else {
                notifikasi.className = "mt-4 p-3 rounded-xl text-center font-semibold bg-rose-500/20 text-rose-300 border border-rose-500/30 text-sm shadow-lg";
            }
            notifikasi.classList.remove('hidden');
            window.scrollTo({ top: notifikasi.offsetTop - 100, behavior: 'smooth' });
        }

        function setButtonLoading(isLoading) {
            if (isLoading) {
                btnKirim.disabled = true;
                btnKirim.innerText = "Memproses Kiriman...";
                btnKirim.className = "w-full bg-slate-700 text-slate-400 font-semibold py-3 px-4 rounded-xl cursor-not-allowed text-sm shadow-inner transform-none";
            } else {
                btnKirim.disabled = false;
                btnKirim.innerText = "Kirim Aspirasi Publik";
                btnKirim.className = "w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-semibold py-3 px-4 rounded-xl transition-all duration-300 shadow-lg shadow-emerald-950/50 cursor-pointer text-sm tracking-wide transform active:scale-[0.98]";
            }
        }

        /**
         * Submit Action Handler
         */
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!validateForm()) {
                showNotification('Silakan periksa kembali kolom input berlabel merah.', false);
                return;
            }

            setButtonLoading(true);
            notifikasi.classList.add('hidden');

            const payload = {
                nama: document.getElementById('nama').value.trim(),
                no_hp: document.getElementById('no_hp').value.trim(),
                kecamatan: document.getElementById('kecamatan').value,
                alamat: document.getElementById('alamat').value.trim(),
                aspirasi: document.getElementById('aspirasi').value.trim()
            };

            try {
                // Eksekusi API Berbasis Jaringan Tanpa Kebocoran CORS (Anti-Duplicate Mode)
                await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                showNotification('Terima kasih! Aspirasi Anda telah berhasil dikirim dan tersimpan dengan aman di database internal.', true);
                form.reset();
                charCount.textContent = '0';
                clearErrors();

            } catch (error) {
                console.error('Transmission Error:', error);
                showNotification('Koneksi terputus. Silakan periksa jaringan internet Anda dan coba lagi.', false);
            } finally {
                setButtonLoading(false);
            }
        });

        console.log('KAWAN PAPA Engine - Glassmorphism UI Active');
    </script>
</body>
</html>
