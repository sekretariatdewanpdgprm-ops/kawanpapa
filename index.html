<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>KAWAN PAPA - Kolom Aspirasi Ke Dewan Padang Pariaman</title>
    
    <meta name="description" content="KAWAN PAPA - Kolom Aspirasi Online Masyarakat Kabupaten Padang Pariaman. Platform resmi untuk menyampaikan aspirasi, keluhan, dan saran kepada DPRD.">
    <meta name="author" content="Sekretariat DPRD Kabupaten Padang Pariaman">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col justify-between">

    <header class="bg-emerald-700 text-white shadow-md py-4 px-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">KAWAN PAPA</h1>
            <p class="text-xs bg-emerald-800 px-3 py-1 rounded-full border border-emerald-600 font-medium">Sekretariat DPRD Kab. Padang Pariaman</p>
        </div>
    </header>

    <main class="max-w-xl w-full mx-auto p-6 my-8 bg-white rounded-xl shadow-sm border border-gray-100">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Sampaikan Aspirasi Anda</h2>
            <p class="text-sm text-gray-500 mt-1">Layanan aspirasi online masyarakat Kabupaten Padang Pariaman</p>
        </div>

        <form id="formAspirasi" class="space-y-4">
            <div>
                <label for="nama" class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap *</label>
                <input type="text" id="nama" name="nama" required 
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" 
                    placeholder="Masukkan nama lengkap Anda">
                <p id="namaError" class="text-xs text-red-600 mt-1 hidden"></p>
            </div>

            <div>
                <label for="no_hp" class="block text-sm font-medium text-gray-700 mb-1">Nomor HP / WhatsApp *</label>
                <input type="tel" id="no_hp" name="no_hp" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" 
                    placeholder="Contoh: 081234567890">
                <p id="no_hpError" class="text-xs text-red-600 mt-1 hidden"></p>
            </div>

            <div>
                <label for="kecamatan" class="block text-sm font-medium text-gray-700 mb-1">Kecamatan *</label>
                <select id="kecamatan" name="kecamatan" required 
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white text-sm">
                    <option value="" disabled selected>-- Pilih Kecamatan --</option>
                    <option value="2X11 Enam Lingkung">2X11 Enam Lingkung</option>
                    <option value="2X11 Kayu Tanam">2X11 Kayu Tanam</option>
                    <option value="IV Koto Aur Malintang">IV Koto Aur Malintang</option>
                    <option value="Batang Anai">Batang Anai</option>
                    <option value="Batang Gasan">Batang Gasan</option>
                    <option value="Enam Lingkung">Enam Lingkung</option>
                    <option value="Lubuk Alung">Lubuk Alung</option>
                    <option value="Nan Sabaris">Nan Sabaris</option>
                    <option value="Padang Sago">Padang Sago</option>
                    <option value="Patamuan">Patamuan</option>
                    <option value="Sintuk Toboh Gadang">Sintuk Toboh Gadang</option>
                    <option value="Sungai Geringging">Sungai Geringging</option>
                    <option value="Sungai Limau">Sungai Limau</option>
                    <option value="Ulakan Tapakis">Ulakan Tapakis</option>
                    <option value="V Koto Kampung Dalam">V Koto Kampung Dalam</option>
                    <option value="V Koto Timur">V Koto Timur</option>
                    <option value="VII Koto Sungai Sarik">VII Koto Sungai Sarik</option>
                </select>
                <p id="kecamatanError" class="text-xs text-red-600 mt-1 hidden"></p>
            </div>

            <div>
                <label for="alamat" class="block text-sm font-medium text-gray-700 mb-1">Alamat Lengkap / Detail *</label>
                <input type="text" id="alamat" name="alamat" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" 
                    placeholder="Nama korong, jalan, atau nomor rumah">
                <p id="alamatError" class="text-xs text-red-600 mt-1 hidden"></p>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="aspirasi" class="block text-sm font-medium text-gray-700">Isi Aspirasi *</label>
                    <span class="text-xs text-gray-400"><span id="charCount">0</span> karakter</span>
                </div>
                <textarea id="aspirasi" name="aspirasi" rows="4" required 
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" 
                    placeholder="Tuliskan aspirasi, keluhan, atau saran Anda secara jelas..."></textarea>
                <p id="aspirasiError" class="text-xs text-red-600 mt-1 hidden"></p>
            </div>

            <button type="submit" id="btnKirim" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 shadow-sm cursor-pointer text-sm">
                Kirim Aspirasi
            </button>
        </form>

        <div id="notifikasi" class="mt-4 p-3 rounded-lg text-center font-medium text-sm hidden"></div>
    </main>

    <footer class="bg-gray-100 text-center py-4 text-xs text-gray-500 border-t border-gray-200">
        <p>&copy; 2026 Sekretariat DPRD Kabupaten Padang Pariaman. All Rights Reserved.</p>
    </footer>

    <script>
        /**
         * KAWAN PAPA - Engine Pendataan Aspirasi Mandiri
         * Dioptimalkan khusus untuk Google Apps Script Web App dengan Kebijakan Keamanan CORS Browser
         */

        // ⚙️ Konfigurasi URL Web App Google Apps Script Anda
        const CONFIG = {
            API_URL: "https://script.google.com/macros/s/AKfycbyJMGKxhTWtg5fNoI9U3ECakmZNgru3IuZ4i4Gex_z5gcxCQVLnkm0G9-Y5_TMIK2Yl/exec"
        };

        // Registrasi Elemen UI
        const form = document.getElementById('formAspirasi');
        const btnKirim = document.getElementById('btnKirim');
        const notifikasi = document.getElementById('notifikasi');
        const aspirasiField = document.getElementById('aspirasi');
        const charCount = document.getElementById('charCount');

        // Penghitung Jumlah Karakter Live
        aspirasiField.addEventListener('input', function() {
            charCount.textContent = this.value.length;
        });

        // Validasi Pola Nomor Telepon Indonesia
        function validatePhoneNumber(phone) {
            const pattern = /^(\+62|0)[0-9]{9,13}$/;
            return pattern.test(phone.trim());
        }

        // Tampilkan Pesan Eror di Bawah Kolom Input
        function showFieldError(fieldId, message) {
            const errorElement = document.getElementById(fieldId + 'Error');
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.classList.remove('hidden');
            }
        }

        // Bersihkan Seluruh Pesan Eror Kolom
        function clearErrors() {
            document.querySelectorAll('[id$="Error"]').forEach(el => {
                el.classList.add('hidden');
                el.textContent = '';
            });
        }

        // Validasi Kelayakan Data Sebelum Dikirim
        function validateForm() {
            clearErrors();
            let isValid = true;

            const nama = document.getElementById('nama').value.trim();
            if (!nama || nama.length < 3) {
                showFieldError('nama', 'Nama wajib diisi minimal 3 karakter.');
                isValid = false;
            }

            const no_hp = document.getElementById('no_hp').value.trim();
            if (!validatePhoneNumber(no_hp)) {
                showFieldError('no_hp', 'Nomor HP tidak valid. Gunakan format angka standar (Contoh: 08123456789).');
                isValid = false;
            }

            const kecamatan = document.getElementById('kecamatan').value;
            if (!kecamatan) {
                showFieldError('kecamatan', 'Silakan pilih kecamatan wilayah asal Anda.');
                isValid = false;
            }

            const alamat = document.getElementById('alamat').value.trim();
            if (!alamat || alamat.length < 5) {
                showFieldError('alamat', 'Alamat detail wajib diisi minimal 5 karakter (Nama korong/jalan).');
                isValid = false;
            }

            const aspirasi = document.getElementById('aspirasi').value.trim();
            if (!aspirasi || aspirasi.length < 10) {
                showFieldError('aspirasi', 'Isi aspirasi terlalu pendek, minimal 10 karakter.');
                isValid = false;
            }

            return isValid;
        }

        // Pengontrol Kotak Notifikasi
        function showNotification(message, isSuccess) {
            notifikasi.textContent = message;
            if (isSuccess) {
                notifikasi.className = "mt-4 p-3 rounded-lg text-center font-medium bg-green-100 text-green-700 border border-green-200 text-sm";
            } else {
                notifikasi.className = "mt-4 p-3 rounded-lg text-center font-medium bg-red-100 text-red-700 border border-red-200 text-sm";
            }
            notifikasi.classList.remove('hidden');
            
            // Efek scroll halus ke arah notifikasi
            window.scrollTo({ top: notifikasi.offsetTop - 100, behavior: 'smooth' });
        }

        // Pengontrol Status Tombol Kirim
        function setButtonLoading(isLoading) {
            if (isLoading) {
                btnKirim.disabled = true;
                btnKirim.innerText = "Mengirim...";
                btnKirim.className = "w-full bg-gray-400 text-white font-medium py-2.5 px-4 rounded-lg cursor-not-allowed text-sm shadow-inner";
            } else {
                btnKirim.disabled = false;
                btnKirim.innerText = "Kirim Aspirasi";
                btnKirim.className = "w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 shadow-sm cursor-pointer text-sm";
            }
        }

        /**
         * Handler Utama Submit Formulir
         */
        form.addEventListener('submit', async function(e) {
            e.preventDefault(); // Kunci halaman agar tidak reload

            // 1. Jalankan Validasi Sisi Klien
            if (!validateForm()) {
                showNotification('Silakan lengkapi kolom berlabel merah dengan benar.', false);
                return;
            }

            // 2. Kunci Tombol Instan (Mencegah Klik Duplikat)
            setButtonLoading(true);
            notifikasi.classList.add('hidden');

            // 3. Susun Paket Data JSON
            const payload = {
                nama: document.getElementById('nama').value.trim(),
                no_hp: document.getElementById('no_hp').value.trim(),
                kecamatan: document.getElementById('kecamatan').value,
                alamat: document.getElementById('alamat').value.trim(),
                aspirasi: document.getElementById('aspirasi').value.trim()
            };

            try {
                // 4. Kirim Data Menggunakan Jalur Kebal CORS 'no-cors'
                await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                // 5. Eksekusi Sukses (Karena no-cors tidak melempar error, berarti transmisi berhasil!)
                showNotification('Terima kasih! Aspirasi Anda telah berhasil dikirim dan tersimpan di database internal.', true);
                
                // Reset Isi Form
                form.reset();
                charCount.textContent = '0';
                clearErrors();

            } catch (error) {
                // Penanganan Eror Jika Betul-betul Putus Jaringan
                console.error('Network Transmit Error:', error);
                showNotification('Gagal terhubung ke server. Silakan periksa koneksi internet Anda atau coba beberapa saat lagi.', false);
            } finally {
                // 6. Lepas Kunci Tombol Kembali Setelah Proses Tuntas
                setButtonLoading(false);
            }
        });

        console.log('KAWAN PAPA Engine - Core System CORS Shield v2.0 Active');
    </script>
</body>
</html>
