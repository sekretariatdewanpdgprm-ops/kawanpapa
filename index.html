<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Character encoding and viewport -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="KAWAN PAPA - Kolom Aspirasi Online Masyarakat Kabupaten Padang Pariaman. Platform untuk menyampaikan aspirasi, keluhan, dan saran kepada DPRD.">
    <meta name="keywords" content="aspirasi, DPRD, Padang Pariaman, layanan masyarakat, saran, keluhan">
    <meta name="author" content="Sekretariat DPRD Kabupaten Padang Pariaman">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="KAWAN PAPA - Kolom Aspirasi Ke Dewan Padang Pariaman">
    <meta property="og:description" content="Platform aspirasi online masyarakat Kabupaten Padang Pariaman">
    <meta property="og:type" content="website">
    
    <!-- Security -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    
    <title>KAWAN PAPA - Kolom Aspirasi Ke Dewan Padang Pariaman</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" defer></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col justify-between">

    <header class="bg-emerald-700 text-white shadow-md py-4 px-3 sm:px-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center gap-2 sm:gap-4">
            <!-- Logo kiri -->
            <img 
                src="lambang.png" 
                alt="Lambang Kabupaten Padang Pariaman" 
                loading="lazy"
                class="w-10 h-10 sm:w-12 sm:h-12 object-contain rounded bg-white p-1 shadow flex-shrink-0">

            <!-- Judul dan subtitle (tengah) -->
            <div class="flex-1 flex flex-col items-center">
                <h1 class="text-base sm:text-xl font-bold tracking-wide text-center">KAWAN PAPA</h1>
                <p class="text-xs bg-emerald-800 px-2 sm:px-3 py-1 rounded-full border border-emerald-600 mt-1 text-center">Sekretariat DPRD Kab. Padang Pariaman</p>
            </div>

            <!-- Logo kanan -->
            <img 
                src="logo_dprd.png" 
                alt="Logo DPRD Kabupaten Padang Pariaman" 
                loading="lazy"
                class="w-10 h-10 sm:w-12 sm:h-12 object-contain rounded bg-white p-1 shadow flex-shrink-0">
        </div>
    </header>

    <main class="max-w-xl w-full mx-auto p-4 sm:p-6 my-6 sm:my-8 bg-white rounded-xl shadow-sm border border-gray-100">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Sampaikan Aspirasi Anda</h2>
            <p class="text-sm text-gray-500 mt-1">Layanan aspirasi online masyarakat Kabupaten Padang Pariaman</p>
        </div>

        <form id="formAspirasi" class="space-y-4" novalidate aria-label="Formulir aspirasi online">
            <!-- Nama Lengkap -->
            <div>
                <label for="nama" class="block text-sm font-medium text-gray-700 mb-1">
                    Nama Lengkap 
                    <span class="text-red-500" aria-label="wajib diisi">*</span>
                </label>
                <input 
                    type="text" 
                    id="nama" 
                    name="nama" 
                    required 
                    aria-required="true"
                    minlength="3"
                    maxlength="100"
                    autocomplete="name"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition" 
                    placeholder="Masukkan nama lengkap Anda">
                <span id="namaError" class="text-red-500 text-xs mt-1 hidden" role="alert"></span>
            </div>

            <!-- Nomor HP -->
            <div>
                <label for="no_hp" class="block text-sm font-medium text-gray-700 mb-1">Nomor HP / WhatsApp</label>
                <input 
                    type="tel" 
                    id="no_hp" 
                    name="no_hp" 
                    autocomplete="tel"
                    pattern="^(\+62|0)[0-9]{9,12}$"
                    maxlength="15"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition" 
                    placeholder="Contoh: 081234567890">
                <span id="no_hpError" class="text-red-500 text-xs mt-1 hidden" role="alert">Format: 08XXXXXXXXXX atau +62XXXXXXXXXX</span>
            </div>

            <!-- Kecamatan -->
            <div>
                <label for="kecamatan" class="block text-sm font-medium text-gray-700 mb-1">
                    Kecamatan 
                    <span class="text-red-500" aria-label="wajib diisi">*</span>
                </label>
                <select 
                    id="kecamatan" 
                    name="kecamatan" 
                    required 
                    aria-required="true"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition bg-white">
                    <option value="" disabled selected>-- Pilih Kecamatan --</option>
                    <option value="2X11 Enam Lingkung">2X11 Enam Lingkung</option>
                    <option value="2X11 Kayu Tanam">2X11 Kayu Tanam</option>
                    <option value="IV Koto Aur Malintang">IV Koto Aur Malintang</option>
                    <option value="Batang Anai">Batang Anai</option>
                    <option value="Batang Gasan">Batang Gasan</option>
                    <option value="Enam Lingkung">Enam Lingkung</option>
                    <option value="Lubuk Alung">Lubuk Alung</option>
                    <option value="Nan Sabaris">Nan Sabaris</option>
                    <option value="Padang Sago">Padang Sago</option>
                    <option value="Patamuan">Patamuan</option>
                    <option value="Sintuk Toboh Gadang">Sintuk Toboh Gadang</option>
                    <option value="Sungai Geringging">Sungai Geringging</option>
                    <option value="Sungai Limau">Sungai Limau</option>
                    <option value="Ulakan Tapakis">Ulakan Tapakis</option>
                    <option value="V Koto Kampung Dalam">V Koto Kampung Dalam</option>
                    <option value="V Koto Timur">V Koto Timur</option>
                    <option value="VII Koto Sungai Sarik">VII Koto Sungai Sarik</option>
                </select>
                <span id="kecamatanError" class="text-red-500 text-xs mt-1 hidden" role="alert"></span>
            </div>

            <!-- Alamat -->
            <div>
                <label for="alamat" class="block text-sm font-medium text-gray-700 mb-1">Alamat Lengkap / Detail</label>
                <input 
                    type="text" 
                    id="alamat" 
                    name="alamat" 
                    maxlength="200"
                    autocomplete="street-address"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition" 
                    placeholder="Nama korong, jalan, atau nomor rumah">
            </div>

            <!-- Aspirasi -->
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="aspirasi" class="block text-sm font-medium text-gray-700">
                        Isi Aspirasi 
                        <span class="text-red-500" aria-label="wajib diisi">*</span>
                    </label>
                    <span class="text-xs text-gray-500">
                        <span id="charCount">0</span>/500
                    </span>
                </div>
                <textarea 
                    id="aspirasi" 
                    name="aspirasi" 
                    rows="4" 
                    required 
                    aria-required="true"
                    minlength="10"
                    maxlength="500"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition resize-none" 
                    placeholder="Tuliskan aspirasi, keluhan, atau saran Anda secara jelas..."></textarea>
                <span id="aspirasiError" class="text-red-500 text-xs mt-1 hidden" role="alert"></span>
            </div>

            <button 
                type="submit" 
                id="btnKirim" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 shadow-sm cursor-pointer disabled:bg-gray-400 disabled:cursor-not-allowed">
                Kirim Aspirasi
            </button>
        </form>

        <div id="notifikasi" class="mt-4 p-3 rounded-lg text-center font-medium hidden" role="alert" aria-live="polite"></div>
    </main>

    <footer class="bg-gray-100 text-center py-4 text-xs text-gray-500 border-t border-gray-200">
        <p>&copy; 2026 Sekretariat DPRD Kabupaten Padang Pariaman. All Rights Reserved.</p>
    </footer>

    <script defer>
        /**
         * KAWAN PAPA - Form Aspirasi Handler
         * Handles form submission with validation and error handling
         */

        // ⚙️ Configuration - Update API URL here
        const CONFIG = {
            API_URL: "https://script.google.com/macros/s/AKfycbyJMGKxhTWtg5fNoI9U3ECakmZNgru3IuZ4i4Gex_z5gcxCQVLnkm0G9-Y5_TMIK2Yl/exec",
            TIMEOUT_MS: 30000,
            MAX_RETRIES: 3
        };

        // Form elements
        const form = document.getElementById('formAspirasi');
        const btnKirim = document.getElementById('btnKirim');
        const notifikasi = document.getElementById('notifikasi');
        const aspirasiField = document.getElementById('aspirasi');
        const charCount = document.getElementById('charCount');

        /**
         * Validate phone number format
         */
        function validatePhoneNumber(phone) {
            if (!phone) return true; // Optional field
            const pattern = /^(\+62|0)[0-9]{9,12}$/;
            return pattern.test(phone);
        }

        /**
         * Show error message for a field
         */
        function showFieldError(fieldId, message) {
            const errorElement = document.getElementById(fieldId + 'Error');
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.classList.remove('hidden');
            }
        }

        /**
         * Clear all error messages
         */
        function clearErrors() {
            document.querySelectorAll('[id$="Error"]').forEach(el => {
                el.classList.add('hidden');
                el.textContent = '';
            });
        }

        /**
         * Validate form fields
         */
        function validateForm() {
            clearErrors();
            let isValid = true;

            // Validate nama
            const nama = document.getElementById('nama').value.trim();
            if (!nama || nama.length < 3) {
                showFieldError('nama', 'Nama harus diisi minimal 3 karakter');
                isValid = false;
            }

            // Validate no_hp
            const no_hp = document.getElementById('no_hp').value.trim();
            if (no_hp && !validatePhoneNumber(no_hp)) {
                showFieldError('no_hp', 'Format nomor telepon tidak valid');
                isValid = false;
            }

            // Validate kecamatan
            const kecamatan = document.getElementById('kecamatan').value;
            if (!kecamatan) {
                showFieldError('kecamatan', 'Kecamatan harus dipilih');
                isValid = false;
            }

            // Validate aspirasi
            const aspirasi = document.getElementById('aspirasi').value.trim();
            if (!aspirasi || aspirasi.length < 10) {
                showFieldError('aspirasi', 'Aspirasi harus diisi minimal 10 karakter');
                isValid = false;
            }

            return isValid;
        }

        /**
         * Update character count for textarea
         */
        aspirasiField.addEventListener('input', function() {
            charCount.textContent = this.value.length;
        });

        /**
         * Show notification message
         */
        function showNotification(message, isSuccess) {
            notifikasi.textContent = message;
            notifikasi.className = `mt-4 p-3 rounded-lg text-center font-medium ${
                isSuccess 
                    ? 'bg-green-100 text-green-700 border border-green-200' 
                    : 'bg-red-100 text-red-700 border border-red-200'
            }`;
            notifikasi.classList.remove('hidden');
            window.scrollTo({ top: notifikasi.offsetTop - 100, behavior: 'smooth' });
        }

        /**
         * Set button state
         */
        function setButtonState(loading, text = 'Kirim Aspirasi') {
            btnKirim.disabled = loading;
            btnKirim.innerText = text;
        }

        /**
         * Send data to backend with retry mechanism
         */
        async function sendToBackend(payload, retryCount = 0) {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), CONFIG.TIMEOUT_MS);

                const response = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });

                clearTimeout(timeout);
                return true;
            } catch (error) {
                if (error.name === 'AbortError') {
                    throw new Error('Request timeout. Silakan periksa koneksi internet Anda.');
                }

                // Retry logic
                if (retryCount < CONFIG.MAX_RETRIES) {
                    console.log(`Retry ${retryCount + 1} dari ${CONFIG.MAX_RETRIES}`);
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    return sendToBackend(payload, retryCount + 1);
                }

                throw error;
            }
        }

        /**
         * Handle form submission
         */
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validate form
            if (!validateForm()) {
                showNotification('Silakan periksa kembali formulir Anda', false);
                return;
            }

            // Prepare payload
            const payload = {
                nama: document.getElementById('nama').value.trim(),
                no_hp: document.getElementById('no_hp').value.trim(),
                kecamatan: document.getElementById('kecamatan').value,
                alamat: document.getElementById('alamat').value.trim(),
                aspirasi: document.getElementById('aspirasi').value.trim(),
                timestamp: new Date().toISOString()
            };

            setButtonState(true, 'Mengirim...');
            notifikasi.classList.add('hidden');

            try {
                await sendToBackend(payload);

                showNotification('Terima kasih! Aspirasi Anda telah berhasil dikirim dan tersimpan di database internal.', true);
                form.reset();
                charCount.textContent = '0';
                clearErrors();
                
                // Auto-scroll to notification
                setTimeout(() => {
                    setButtonState(false);
                }, 2000);

            } catch (error) {
                console.error('Submission error:', error);
                const errorMsg = error.message || 'Terjadi kesalahan saat mengirim data. Silakan coba lagi.';
                showNotification(`Gagal mengirim: ${errorMsg}`, false);
                setButtonState(false);
            }
        });

        // Log initialization
        console.log('KAWAN PAPA Form initialized successfully');
    </script>
</body>
</html>
