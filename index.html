<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAWAN PAPA - Kolom Aspirasi Ke Dewan Padang Pariaman</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col justify-between">

    <header class="bg-emerald-700 text-white shadow-md py-4 px-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">KAWAN PAPA</h1>
            <p class="text-xs bg-emerald-800 px-3 py-1 rounded-full border border-emerald-600">Sekretariat DPRD Kab. Padang Pariaman</p>
        </div>
    </header>

    <main class="max-w-xl w-full mx-auto p-6 my-8 bg-white rounded-xl shadow-sm border border-gray-100">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Sampaikan Aspirasi Anda</h2>
            <p class="text-sm text-gray-500 mt-1">Layanan aspirasi online masyarakat Kabupaten Padang Pariaman</p>
        </div>

        <form id="formAspirasi" class="space-y-4">
            <div>
                <label for="nama" class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap *</label>
                <input type="text" id="nama" name="nama" required 
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500" 
                    placeholder="Masukkan nama lengkap Anda">
            </div>

            <div>
                <label for="no_hp" class="block text-sm font-medium text-gray-700 mb-1">Nomor HP / WhatsApp</label>
                <input type="tel" id="no_hp" name="no_hp" 
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500" 
                    placeholder="Contoh: 081234567890">
            </div>

            <div>
                <label for="aspirasi" class="block text-sm font-medium text-gray-700 mb-1">Isi Aspirasi *</label>
                <textarea id="aspirasi" name="aspirasi" rows="5" required 
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500" 
                    placeholder="Tuliskan aspirasi, keluhan, atau saran Anda secara jelas..."></textarea>
            </div>

            <button type="submit" id="btnKirim" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 shadow-sm cursor-pointer">
                Kirim Aspirasi
            </button>
        </form>

        <div id="notifikasi" class="mt-4 p-3 rounded-lg text-center font-medium hidden"></div>
    </main>

    <footer class="bg-gray-100 text-center py-4 text-xs text-gray-500 border-t border-gray-200">
        <p>&copy; Handra Praditia Putra | 2026 Sekretariat DPRD Kabupaten Padang Pariaman. All Rights Reserved.</p>
    </footer>

    <script>
        // 📌 PENTING: Ganti URL di bawah ini dengan URL Web App dari Google Apps Script Anda yang dicatat tadi!
        const URL_GAS_BACKEND = "https://script.google.com/macros/s/AKfycbwsPnsG0SIuiL5kiZ-WxvFfhH1TLjOPvIbQHoXqNAlXIFrnDt-0f_0wf--sizi2yF4n/exec";

        document.getElementById('formAspirasi').addEventListener('submit', async function(e) {
            e.preventDefault(); // Mencegah halaman reload saat submit

            const btnKirim = document.getElementById('btnKirim');
            const notifikasi = document.getElementById('notifikasi');

            // Ambil data dari elemen input form
            const payload = {
                nama: document.getElementById('nama').value,
                no_hp: document.getElementById('no_hp').value,
                aspirasi: document.getElementById('aspirasi').value
            };

            // Mengubah tampilan tombol menjadi mode loading
            btnKirim.disabled = true;
            btnKirim.innerText = "Mengirim...";
            btnKirim.className = "w-full bg-gray-400 text-white font-medium py-2.5 px-4 rounded-lg cursor-not-allowed";

            // Sembunyikan notifikasi sebelumnya jika ada
            notifikasi.classList.add('hidden');

            try {
                // Mengirim data menggunakan metode POST ke URL Google Apps Script via HTTPS
                const response = await fetch(URL_GAS_BACKEND, {
                    method: 'POST',
                    mode: 'no-cors', // Digunakan untuk menghindari kendala CORS pada request lintas domain gratisan
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                // Karena menggunakan mode 'no-cors', kita asumsikan pengiriman sukses jika tidak masuk ke blok catch
                notifikasi.innerText = "Terima kasih! Aspirasi Anda telah berhasil dikirim dan tersimpan di database internal.";
                notifikasi.className = "mt-4 p-3 rounded-lg text-center font-medium bg-green-100 text-green-700 border border-green-200";
                notifikasi.classList.remove('hidden');

                // Reset isi form setelah berhasil
                document.getElementById('formAspirasi').reset();

            } catch (error) {
                // Penanganan error (error handling) di sisi UI jika koneksi bermasalah
                notifikasi.innerText = "Gagal mengirim data: " + error.message + ". Silakan coba lagi.";
                notifikasi.className = "mt-4 p-3 rounded-lg text-center font-medium bg-red-100 text-red-700 border border-red-200";
                notifikasi.classList.remove('hidden');
            } finally {
                // Mengembalikan tombol ke status semula
                btnKirim.disabled = false;
                btnKirim.innerText = "Kirim Aspirasi";
                btnKirim.className = "w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 shadow-sm cursor-pointer";
            }
        });
    </script>
</body>
</html>
